<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TubeRead v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Playfair+Display:wght@600;700&display=swap');

:root {
–bg: #faf9f7;
–surface: #ffffff;
–surface2: #f3f1ee;
–border: #e8e5e0;
–text: #1a1a18;
–text2: #6b6860;
–text3: #9e9a92;
–accent: #e23d28;
–accent2: #c7311e;
–accent-soft: #fdf0ee;
–green: #16a34a;
–shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
–radius: 12px;
–sans: ‘DM Sans’, -apple-system, sans-serif;
–display: ‘Playfair Display’, Georgia, serif;
–max-w: 480px;
}

- { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
background: var(–bg);
color: var(–text);
font-family: var(–sans);
font-size: 15px;
line-height: 1.5;
min-height: 100dvh;
overflow-x: hidden;
}

.app {
max-width: var(–max-w);
margin: 0 auto;
min-height: 100dvh;
background: var(–bg);
position: relative;
}

/* ─── Top bar ─── */
.topbar {
position: sticky;
top: 0;
z-index: 100;
background: var(–bg);
border-bottom: 1px solid var(–border);
padding: 12px 16px;
display: flex;
align-items: center;
justify-content: space-between;
}

.topbar h1 {
font-family: var(–display);
font-size: 1.35rem;
font-weight: 700;
color: var(–accent);
letter-spacing: -0.02em;
}

.topbar h1 span {
font-family: var(–sans);
font-size: 0.55rem;
font-weight: 500;
color: var(–text3);
vertical-align: super;
margin-left: 3px;
letter-spacing: 0.02em;
}

.topbar-actions { display: flex; gap: 8px; }

.icon-btn {
width: 36px; height: 36px;
border-radius: 50%;
border: 1px solid var(–border);
background: var(–surface);
display: flex; align-items: center; justify-content: center;
cursor: pointer;
transition: all 0.15s;
font-size: 16px;
}

.icon-btn:active { transform: scale(0.92); background: var(–surface2); }

/* ─── Screens ─── */
.screen { display: none; }
.screen.active { display: block; }

/* ─── Settings ─── */
.settings-screen { padding: 16px; }

.settings-group {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 16px;
margin-bottom: 12px;
box-shadow: var(–shadow);
}

.settings-group h3 {
font-size: 0.7rem; font-weight: 600;
text-transform: uppercase;
letter-spacing: 0.06em;
color: var(–text3);
margin-bottom: 10px;
}

.key-field { margin-bottom: 10px; }
.key-field:last-child { margin-bottom: 0; }

.key-field label {
display: block; font-size: 0.75rem;
font-weight: 500; color: var(–text2);
margin-bottom: 4px;
}

.key-field input {
width: 100%; padding: 10px 12px;
border: 1px solid var(–border);
border-radius: 8px;
font-family: monospace; font-size: 0.8rem;
background: var(–surface2); color: var(–text);
outline: none; transition: border-color 0.15s;
}

.key-field input:focus { border-color: var(–accent); }

.btn {
display: inline-flex; align-items: center; justify-content: center;
gap: 6px; padding: 10px 20px; border-radius: 8px; border: none;
font-family: var(–sans); font-size: 0.85rem; font-weight: 600;
cursor: pointer; transition: all 0.15s;
}

.btn:active { transform: scale(0.96); }
.btn-primary { background: var(–accent); color: white; width: 100%; }
.btn-primary:hover { background: var(–accent2); }

/* ─── Stories row ─── */
.stories-row {
display: flex; gap: 12px; padding: 14px 16px;
overflow-x: auto; scrollbar-width: none;
border-bottom: 1px solid var(–border);
}

.stories-row::-webkit-scrollbar { display: none; }

.story-item {
display: flex; flex-direction: column;
align-items: center; gap: 4px;
min-width: 64px; cursor: pointer;
}

.story-avatar {
width: 56px; height: 56px;
border-radius: 50%;
border: 2px solid var(–border);
overflow: hidden;
transition: border-color 0.15s;
background: var(–surface2);
}

.story-item.active .story-avatar { border-color: var(–accent); }
.story-avatar img { width: 100%; height: 100%; object-fit: cover; }

.story-name {
font-size: 0.65rem; font-weight: 500; color: var(–text2);
max-width: 64px; overflow: hidden; text-overflow: ellipsis;
white-space: nowrap; text-align: center;
}

.story-item.all-item .story-avatar {
display: flex; align-items: center; justify-content: center;
font-size: 1.2rem; background: var(–accent-soft);
border-color: var(–accent);
}

/* ─── Feed ─── */
.feed { padding-bottom: 80px; }

.feed-empty {
text-align: center; padding: 60px 32px;
}

.feed-empty .emoji { font-size: 3rem; margin-bottom: 12px; }

.feed-empty h2 {
font-family: var(–display); font-size: 1.2rem; margin-bottom: 6px;
}

.feed-empty p {
color: var(–text2); font-size: 0.85rem; margin-bottom: 20px;
}

/* ─── Card ─── */
.card {
background: var(–surface);
border-bottom: 1px solid var(–border);
animation: cardIn 0.35s ease both;
}

@keyframes cardIn {
from { opacity: 0; transform: translateY(12px); }
to { opacity: 1; transform: translateY(0); }
}

.card-header {
display: flex; align-items: center; gap: 10px;
padding: 12px 16px;
}

.card-avatar {
width: 32px; height: 32px; border-radius: 50%;
overflow: hidden; flex-shrink: 0; background: var(–surface2);
}

.card-avatar img { width: 100%; height: 100%; object-fit: cover; }
.card-channel { font-size: 0.82rem; font-weight: 600; }
.card-date { font-size: 0.7rem; color: var(–text3); }

.card-thumb {
width: 100%; aspect-ratio: 16/9;
background: var(–surface2);
position: relative; cursor: pointer; overflow: hidden;
}

.card-thumb img {
width: 100%; height: 100%; object-fit: cover;
transition: transform 0.3s;
}

.card-thumb:active img { transform: scale(1.02); }

.play-overlay {
position: absolute; inset: 0;
display: flex; align-items: center; justify-content: center;
background: rgba(0,0,0,0.2);
opacity: 0; transition: opacity 0.2s;
}

.card-thumb:hover .play-overlay { opacity: 1; }

.play-btn-overlay {
width: 56px; height: 56px; border-radius: 50%;
background: rgba(0,0,0,0.7);
display: flex; align-items: center; justify-content: center;
color: white; font-size: 1.4rem;
backdrop-filter: blur(4px);
}

.card-duration {
position: absolute; bottom: 8px; right: 8px;
background: rgba(0,0,0,0.8); color: white;
font-size: 0.7rem; font-weight: 600;
padding: 2px 6px; border-radius: 4px;
font-family: monospace;
}

.card-body { padding: 12px 16px 6px; }

.card-title {
font-size: 0.9rem; font-weight: 600; line-height: 1.35;
margin-bottom: 8px;
}

/* ─── Inline content area ─── */
.card-content {
font-size: 0.84rem;
color: var(–text2);
line-height: 1.6;
padding: 0 16px 14px;
white-space: pre-wrap;
}

.card-content.narration {
font-size: 0.88rem;
color: var(–text);
line-height: 1.7;
background: var(–surface2);
margin: 0 12px 12px;
padding: 14px;
border-radius: 10px;
border-left: 3px solid var(–accent);
}

.content-loading {
display: flex; align-items: center; gap: 8px;
color: var(–text3); font-size: 0.8rem;
padding: 8px 0;
}

.mini-spinner {
width: 14px; height: 14px;
border: 2px solid var(–border);
border-top-color: var(–accent);
border-radius: 50%;
animation: spin 0.6s linear infinite;
flex-shrink: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }

.detail-badge {
display: inline-block;
font-size: 0.6rem;
font-weight: 600;
text-transform: uppercase;
letter-spacing: 0.05em;
padding: 2px 7px;
border-radius: 4px;
margin-bottom: 6px;
}

.detail-badge.tldr { background: #e8f5e9; color: #2e7d32; }
.detail-badge.brief { background: #e3f2fd; color: #1565c0; }
.detail-badge.narration { background: var(–accent-soft); color: var(–accent); }

.card-actions {
display: flex; gap: 16px; padding: 0 16px 12px;
}

.card-action-btn {
display: flex; align-items: center; gap: 5px;
background: none; border: none;
font-family: var(–sans); font-size: 0.78rem;
font-weight: 500; color: var(–text2);
cursor: pointer; padding: 4px 0;
}

.card-action-btn:active { color: var(–accent); }

/* ─── Player overlay ─── */
.player-overlay {
display: none; position: fixed; inset: 0; z-index: 200;
background: rgba(0,0,0,0.92);
align-items: center; justify-content: center; flex-direction: column;
}

.player-overlay.visible { display: flex; }

.player-close {
position: absolute; top: 12px; right: 12px;
width: 36px; height: 36px; border-radius: 50%; border: none;
background: rgba(255,255,255,0.15); color: white;
font-size: 1.2rem; cursor: pointer;
display: flex; align-items: center; justify-content: center;
}

.player-container {
width: 100%; max-width: var(–max-w); aspect-ratio: 16/9;
}

.player-container iframe {
width: 100%; height: 100%; border: none; border-radius: 8px;
}

/* ─── Search overlay ─── */
.search-overlay {
display: none; position: fixed; inset: 0; z-index: 150;
background: var(–bg); flex-direction: column;
}

.search-overlay.visible { display: flex; }

.search-bar {
display: flex; align-items: center; gap: 8px;
padding: 12px 16px; border-bottom: 1px solid var(–border);
}

.search-bar input {
flex: 1; padding: 10px 14px;
border: 1px solid var(–border); border-radius: 24px;
font-family: var(–sans); font-size: 0.9rem;
background: var(–surface2); color: var(–text); outline: none;
}

.search-bar input:focus { border-color: var(–accent); }

.search-cancel {
background: none; border: none;
font-family: var(–sans); font-size: 0.85rem;
font-weight: 500; color: var(–accent);
cursor: pointer; white-space: nowrap;
}

.search-results { flex: 1; overflow-y: auto; padding: 8px 0; }

.search-item {
display: flex; align-items: center; gap: 12px;
padding: 10px 16px; cursor: pointer; transition: background 0.1s;
}

.search-item:active { background: var(–surface2); }

.search-item-avatar {
width: 44px; height: 44px; border-radius: 50%;
overflow: hidden; flex-shrink: 0; background: var(–surface2);
}

.search-item-avatar img { width: 100%; height: 100%; object-fit: cover; }
.search-item-info { flex: 1; min-width: 0; }

.search-item-name {
font-size: 0.88rem; font-weight: 600;
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.search-item-bio {
font-size: 0.75rem; color: var(–text2);
display: -webkit-box; -webkit-line-clamp: 2;
-webkit-box-orient: vertical; overflow: hidden; line-height: 1.35;
}

.search-item-sub { font-size: 0.7rem; color: var(–text3); margin-top: 2px; }

.sub-btn {
padding: 6px 16px; border-radius: 6px;
font-family: var(–sans); font-size: 0.75rem; font-weight: 600;
cursor: pointer; border: none; transition: all 0.15s; flex-shrink: 0;
}

.sub-btn.subscribe { background: var(–accent); color: white; }
.sub-btn.subscribed { background: var(–surface2); color: var(–text2); border: 1px solid var(–border); }

.search-empty, .search-loading {
text-align: center; padding: 40px 16px; color: var(–text3); font-size: 0.85rem;
}

.search-loading {
display: flex; align-items: center; justify-content: center; gap: 8px;
padding: 24px;
}

/* ─── Manage channels ─── */
.manage-item {
display: flex; align-items: flex-start; gap: 12px;
padding: 14px 16px;
border-bottom: 1px solid var(–border);
background: var(–surface);
}

.manage-item-avatar {
width: 44px; height: 44px; border-radius: 50%;
overflow: hidden; background: var(–surface2); flex-shrink: 0;
}

.manage-item-avatar img { width: 100%; height: 100%; object-fit: cover; }
.manage-item-info { flex: 1; min-width: 0; }
.manage-item-name { font-size: 0.88rem; font-weight: 600; }
.manage-item-subs { font-size: 0.72rem; color: var(–text3); margin-bottom: 8px; }

/* Detail level selector */
.detail-selector {
display: flex; gap: 0; border-radius: 8px;
overflow: hidden; border: 1px solid var(–border);
}

.detail-option {
flex: 1; padding: 7px 4px;
text-align: center; font-family: var(–sans);
font-size: 0.68rem; font-weight: 600;
cursor: pointer; border: none;
background: var(–surface2); color: var(–text3);
transition: all 0.15s;
border-right: 1px solid var(–border);
}

.detail-option:last-child { border-right: none; }

.detail-option.active {
background: var(–accent);
color: white;
}

.detail-option:active { opacity: 0.8; }

.delete-btn {
width: 32px; height: 32px; border-radius: 50%;
border: 1px solid var(–border); background: white;
color: var(–accent); font-size: 1rem; cursor: pointer;
display: flex; align-items: center; justify-content: center;
flex-shrink: 0; margin-top: 6px;
}

.delete-btn:active { background: var(–accent-soft); }

/* ─── Feed loading ─── */
.feed-loading {
display: flex; flex-direction: column; align-items: center;
gap: 8px; padding: 40px; color: var(–text3); font-size: 0.82rem;
}

.feed-loading .spinner {
width: 24px; height: 24px;
border: 2px solid var(–border);
border-top-color: var(–accent);
border-radius: 50%; animation: spin 0.6s linear infinite;
}

/* ─── Generation progress bar ─── */
.gen-progress {
display: none;
padding: 12px 16px;
background: var(–accent-soft);
border-bottom: 1px solid var(–border);
}

.gen-progress.visible { display: block; }

.gen-progress-text {
font-size: 0.75rem; font-weight: 500; color: var(–accent);
margin-bottom: 6px;
}

.gen-bar {
height: 3px; background: var(–border); border-radius: 2px;
overflow: hidden;
}

.gen-bar-fill {
height: 100%; background: var(–accent);
border-radius: 2px; transition: width 0.3s;
width: 0%;
}

/* ─── Bottom nav ─── */
.bottom-nav {
position: fixed; bottom: 0; left: 50%;
transform: translateX(-50%); width: 100%; max-width: var(–max-w);
background: var(–surface); border-top: 1px solid var(–border);
display: flex; z-index: 100;
padding-bottom: env(safe-area-inset-bottom, 0);
}

.nav-item {
flex: 1; display: flex; flex-direction: column;
align-items: center; gap: 2px; padding: 8px 0;
cursor: pointer; border: none; background: none;
font-family: var(–sans); color: var(–text3); transition: color 0.15s;
}

.nav-item.active { color: var(–accent); }
.nav-item .nav-icon { font-size: 1.2rem; }
.nav-item .nav-label { font-size: 0.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }

/* ─── Toast ─── */
.toast {
position: fixed; bottom: 70px; left: 50%;
transform: translateX(-50%) translateY(20px);
background: var(–text); color: white;
font-size: 0.8rem; font-weight: 500;
padding: 10px 20px; border-radius: 24px;
z-index: 300; opacity: 0; transition: all 0.3s;
pointer-events: none; white-space: nowrap;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

</head>
<body>

<div class="app" id="app">
  <div class="topbar">
    <h1>TubeRead <span>v2</span></h1>
    <div class="topbar-actions">
      <button class="icon-btn" id="searchBtn" title="Find channels">🔍</button>
      <button class="icon-btn" id="settingsBtn" title="Settings">⚙️</button>
    </div>
  </div>

  <!-- Feed screen -->

  <div class="screen active" id="feedScreen">
    <div class="stories-row" id="storiesRow"></div>
    <div class="gen-progress" id="genProgress">
      <div class="gen-progress-text" id="genProgressText">Generating summaries...</div>
      <div class="gen-bar"><div class="gen-bar-fill" id="genBarFill"></div></div>
    </div>
    <div class="feed" id="feed"></div>
  </div>

  <!-- Manage screen -->

  <div class="screen" id="manageScreen">
    <div style="padding:16px 0;">
      <h2 style="font-family:var(--display);font-size:1.15rem;margin-bottom:4px;padding:0 16px;">Your Channels</h2>
      <p style="font-size:0.78rem;color:var(--text3);padding:0 16px;margin-bottom:12px;">Set detail level per channel. Changes regenerate summaries.</p>
      <div id="manageList"></div>
      <div id="manageEmpty" style="display:none;text-align:center;padding:40px 16px;color:var(--text3);font-size:0.85rem;">
        No channels yet. Tap 🔍 to discover.
      </div>
    </div>
  </div>

  <!-- Settings screen -->

  <div class="screen" id="settingsScreen">
    <div class="settings-screen">
      <h2 style="font-family:var(--display);font-size:1.15rem;margin-bottom:12px;">Settings</h2>
      <div class="settings-group">
        <h3>API Keys</h3>
        <div class="key-field">
          <label>YouTube Data API</label>
          <input type="password" id="sYtKey" placeholder="AIza..." />
        </div>
        <div class="key-field">
          <label>Anthropic (Claude)</label>
          <input type="password" id="sClaudeKey" placeholder="sk-ant-..." />
        </div>
        <div class="key-field">
          <label>Apify</label>
          <input type="password" id="sApifyKey" placeholder="apify_api_..." />
        </div>
      </div>
      <button class="btn btn-primary" id="saveKeysBtn">Save Keys</button>
      <p id="keysStatus" style="text-align:center;margin-top:8px;font-size:0.78rem;color:var(--text3);"></p>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-item active" data-screen="feedScreen">
      <span class="nav-icon">📰</span><span class="nav-label">Feed</span>
    </button>
    <button class="nav-item" data-screen="manageScreen">
      <span class="nav-icon">📺</span><span class="nav-label">Channels</span>
    </button>
    <button class="nav-item" data-screen="settingsScreen">
      <span class="nav-icon">⚙️</span><span class="nav-label">Settings</span>
    </button>
  </div>
</div>

<!-- Search overlay -->

<div class="search-overlay" id="searchOverlay">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search YouTube channels..." autocomplete="off" />
    <button class="search-cancel" id="searchCancel">Cancel</button>
  </div>
  <div class="search-results" id="searchResults">
    <div class="search-empty">Type a channel name to search</div>
  </div>
</div>

<!-- Video player -->

<div class="player-overlay" id="playerOverlay">
  <button class="player-close" id="playerClose">✕</button>
  <div class="player-container">
    <iframe id="playerFrame" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
var keys = { yt: '', claude: '', apify: '' };
// channels: [{id, title, thumb, description, subs, detailLevel: 'tldr'|'brief'|'narration'}]
var channels = [];
var videoCache = {}; // channelId -> [videos]
// summaryCache: { videoId: { tldr: '...', brief: '...', narration: '...' } }
var summaryCache = {};
var activeFilter = null;
var searchTimer = null;
var isGenerating = false;

var DETAIL_LEVELS = {
  tldr: { label: 'TLDR', badge: 'tldr' },
  brief: { label: 'Brief', badge: 'brief' },
  narration: { label: 'Narration', badge: 'narration' }
};

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2400);
}

function formatCount(n) {
  if (!n) return '';
  n = parseInt(n);
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(0) + 'K';
  return n.toString();
}

function timeAgo(dateStr) {
  var d = new Date(dateStr);
  var now = new Date();
  var diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
  return d.toLocaleDateString();
}

function parseDuration(iso) {
  if (!iso) return '';
  var m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return '';
  var h = m[1] ? parseInt(m[1]) : 0;
  var min = m[2] ? parseInt(m[2]) : 0;
  var s = m[3] ? parseInt(m[3]) : 0;
  if (h > 0) return h + ':' + String(min).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  return min + ':' + String(s).padStart(2,'0');
}

function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) { return (s||'').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

async function ytFetch(endpoint, params) {
  params.key = keys.yt;
  var qs = Object.keys(params).map(function(k) { return k + '=' + encodeURIComponent(params[k]); }).join('&');
  var res = await fetch('https://www.googleapis.com/youtube/v3/' + endpoint + '?' + qs);
  if (!res.ok) throw new Error('YouTube API ' + res.status);
  return res.json();
}

function getChannelDetailLevel(channelId) {
  var ch = channels.find(function(c) { return c.id === channelId; });
  return ch ? (ch.detailLevel || 'tldr') : 'tldr';
}

// ═══════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(function(n) {
    n.classList.toggle('active', n.getAttribute('data-screen') === id);
  });
  if (id === 'manageScreen') renderManageList();
  if (id === 'feedScreen') renderFeed();
}

document.querySelectorAll('.nav-item').forEach(function(btn) {
  btn.addEventListener('click', function() { showScreen(this.getAttribute('data-screen')); });
});

// ═══════════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════════
function loadState() {
  try {
    var k = JSON.parse(localStorage.getItem('tr2_keys') || '{}');
    keys.yt = k.yt || ''; keys.claude = k.claude || ''; keys.apify = k.apify || '';
    channels = JSON.parse(localStorage.getItem('tr2_channels') || '[]');
    summaryCache = JSON.parse(localStorage.getItem('tr2_summaries') || '{}');
  } catch(e) {}
  document.getElementById('sYtKey').value = keys.yt;
  document.getElementById('sClaudeKey').value = keys.claude;
  document.getElementById('sApifyKey').value = keys.apify;
}

function saveChannels() {
  localStorage.setItem('tr2_channels', JSON.stringify(channels));
}

function saveSummaries() {
  localStorage.setItem('tr2_summaries', JSON.stringify(summaryCache));
}

document.getElementById('saveKeysBtn').addEventListener('click', function() {
  keys.yt = document.getElementById('sYtKey').value.trim();
  keys.claude = document.getElementById('sClaudeKey').value.trim();
  keys.apify = document.getElementById('sApifyKey').value.trim();
  localStorage.setItem('tr2_keys', JSON.stringify(keys));
  var missing = [];
  if (!keys.yt) missing.push('YouTube');
  if (!keys.claude) missing.push('Claude');
  if (!keys.apify) missing.push('Apify');
  var el = document.getElementById('keysStatus');
  if (missing.length === 0) {
    el.textContent = 'All keys saved.'; el.style.color = 'var(--green)';
    toast('Keys saved');
  } else {
    el.textContent = 'Missing: ' + missing.join(', '); el.style.color = 'var(--accent)';
  }
});

document.getElementById('settingsBtn').addEventListener('click', function() { showScreen('settingsScreen'); });

// ═══════════════════════════════════════════
//  CHANNEL SEARCH
// ═══════════════════════════════════════════
document.getElementById('searchBtn').addEventListener('click', function() {
  document.getElementById('searchOverlay').classList.add('visible');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchInput').focus();
  document.getElementById('searchResults').innerHTML = '<div class="search-empty">Type a channel name to search</div>';
});

document.getElementById('searchCancel').addEventListener('click', function() {
  document.getElementById('searchOverlay').classList.remove('visible');
});

document.getElementById('searchInput').addEventListener('input', function() {
  var q = this.value.trim();
  clearTimeout(searchTimer);
  if (q.length < 2) {
    document.getElementById('searchResults').innerHTML = '<div class="search-empty">Type a channel name to search</div>';
    return;
  }
  document.getElementById('searchResults').innerHTML = '<div class="search-loading"><div class="mini-spinner"></div> Searching...</div>';
  searchTimer = setTimeout(function() { searchChannels(q); }, 400);
});

async function searchChannels(query) {
  if (!keys.yt) {
    document.getElementById('searchResults').innerHTML = '<div class="search-empty">Set your YouTube API key in Settings first.</div>';
    return;
  }
  try {
    var data = await ytFetch('search', { part: 'snippet', type: 'channel', q: query, maxResults: 8 });
    if (!data.items || data.items.length === 0) {
      document.getElementById('searchResults').innerHTML = '<div class="search-empty">No channels found</div>';
      return;
    }
    var ids = data.items.map(function(i) { return i.snippet.channelId; }).join(',');
    var details = await ytFetch('channels', { part: 'snippet,statistics', id: ids });
    var detailMap = {};
    if (details.items) details.items.forEach(function(c) { detailMap[c.id] = c; });
    renderSearchResults(data.items, detailMap);
  } catch (err) {
    document.getElementById('searchResults').innerHTML = '<div class="search-empty">Error: ' + err.message + '</div>';
  }
}

function renderSearchResults(items, detailMap) {
  var html = '';
  items.forEach(function(item) {
    var chId = item.snippet.channelId;
    var detail = detailMap[chId];
    var thumb = item.snippet.thumbnails && item.snippet.thumbnails['default'] ? item.snippet.thumbnails['default'].url : '';
    var desc = detail ? (detail.snippet.description || '').substring(0, 120) : (item.snippet.description || '').substring(0, 120);
    var subs = detail && detail.statistics ? formatCount(detail.statistics.subscriberCount) + ' subscribers' : '';
    var isSub = channels.some(function(c) { return c.id === chId; });

    html += '<div class="search-item">';
    html += '<div class="search-item-avatar"><img src="' + thumb + '" alt="" /></div>';
    html += '<div class="search-item-info">';
    html += '<div class="search-item-name">' + escHtml(item.snippet.title) + '</div>';
    html += '<div class="search-item-bio">' + escHtml(desc) + '</div>';
    if (subs) html += '<div class="search-item-sub">' + subs + '</div>';
    html += '</div>';
    html += '<button class="sub-btn ' + (isSub ? 'subscribed' : 'subscribe') + '" data-chid="' + chId + '" data-title="' + escAttr(item.snippet.title) + '" data-thumb="' + escAttr(thumb) + '" data-desc="' + escAttr(desc) + '" data-subs="' + escAttr(subs) + '">' + (isSub ? 'Following' : 'Follow') + '</button>';
    html += '</div>';
  });
  document.getElementById('searchResults').innerHTML = html;

  document.querySelectorAll('.sub-btn').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var chId = this.getAttribute('data-chid');
      var isSub = channels.some(function(c) { return c.id === chId; });
      if (isSub) {
        channels = channels.filter(function(c) { return c.id !== chId; });
        this.className = 'sub-btn subscribe';
        this.textContent = 'Follow';
        toast('Unfollowed');
      } else {
        channels.push({
          id: chId,
          title: this.getAttribute('data-title'),
          thumb: this.getAttribute('data-thumb'),
          description: this.getAttribute('data-desc'),
          subs: this.getAttribute('data-subs'),
          detailLevel: 'tldr'
        });
        this.className = 'sub-btn subscribed';
        this.textContent = 'Following';
        toast('Following! Generating summaries...');
        delete videoCache[chId];
        // Pre-generate summaries for this channel
        preGenerateChannel(chId);
      }
      saveChannels();
      renderStories();
    });
  });
}

// ═══════════════════════════════════════════
//  STORIES ROW
// ═══════════════════════════════════════════
function renderStories() {
  var row = document.getElementById('storiesRow');
  if (channels.length === 0) { row.innerHTML = ''; return; }

  var html = '<div class="story-item all-item' + (activeFilter === null ? ' active' : '') + '" data-filter="all">';
  html += '<div class="story-avatar">✦</div>';
  html += '<div class="story-name">All</div></div>';

  channels.forEach(function(ch) {
    html += '<div class="story-item' + (activeFilter === ch.id ? ' active' : '') + '" data-filter="' + ch.id + '">';
    html += '<div class="story-avatar"><img src="' + ch.thumb + '" alt="" /></div>';
    html += '<div class="story-name">' + escHtml(ch.title) + '</div></div>';
  });

  row.innerHTML = html;
  row.querySelectorAll('.story-item').forEach(function(item) {
    item.addEventListener('click', function() {
      var f = this.getAttribute('data-filter');
      activeFilter = (f === 'all') ? null : f;
      renderStories();
      renderFeed();
    });
  });
}

// ═══════════════════════════════════════════
//  MANAGE CHANNELS
// ═══════════════════════════════════════════
function renderManageList() {
  var list = document.getElementById('manageList');
  var empty = document.getElementById('manageEmpty');
  if (channels.length === 0) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  var html = '';
  channels.forEach(function(ch) {
    var dl = ch.detailLevel || 'tldr';
    html += '<div class="manage-item">';
    html += '<div class="manage-item-avatar"><img src="' + ch.thumb + '" alt="" /></div>';
    html += '<div class="manage-item-info">';
    html += '<div class="manage-item-name">' + escHtml(ch.title) + '</div>';
    html += '<div class="manage-item-subs">' + (ch.subs || '') + '</div>';
    html += '<div class="detail-selector" data-chid="' + ch.id + '">';
    html += '<button class="detail-option' + (dl === 'tldr' ? ' active' : '') + '" data-level="tldr">TLDR</button>';
    html += '<button class="detail-option' + (dl === 'brief' ? ' active' : '') + '" data-level="brief">Brief</button>';
    html += '<button class="detail-option' + (dl === 'narration' ? ' active' : '') + '" data-level="narration">Narration</button>';
    html += '</div>';
    html += '</div>';
    html += '<button class="delete-btn" data-chid="' + ch.id + '" title="Unfollow">✕</button>';
    html += '</div>';
  });
  list.innerHTML = html;

  // Delete handlers
  list.querySelectorAll('.delete-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var chId = this.getAttribute('data-chid');
      channels = channels.filter(function(c) { return c.id !== chId; });
      saveChannels();
      renderManageList();
      renderStories();
      toast('Channel removed');
    });
  });

  // Detail level handlers
  list.querySelectorAll('.detail-option').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var selector = this.closest('.detail-selector');
      var chId = selector.getAttribute('data-chid');
      var newLevel = this.getAttribute('data-level');
      var ch = channels.find(function(c) { return c.id === chId; });
      if (!ch || ch.detailLevel === newLevel) return;

      var oldLevel = ch.detailLevel;
      ch.detailLevel = newLevel;
      saveChannels();

      // Update UI
      selector.querySelectorAll('.detail-option').forEach(function(o) {
        o.classList.toggle('active', o.getAttribute('data-level') === newLevel);
      });

      toast('Switched to ' + DETAIL_LEVELS[newLevel].label + '. Regenerating...');

      // Pre-generate for new level
      preGenerateChannel(chId);
    });
  });
}

// ═══════════════════════════════════════════
//  FETCH VIDEOS
// ═══════════════════════════════════════════
async function fetchChannelVideos(channelId) {
  if (videoCache[channelId]) return videoCache[channelId];

  var searchData = await ytFetch('search', {
    part: 'snippet', channelId: channelId,
    order: 'date', type: 'video', maxResults: 5
  });

  if (!searchData.items || searchData.items.length === 0) {
    videoCache[channelId] = [];
    return [];
  }

  var ids = searchData.items.map(function(i) { return i.id.videoId; }).join(',');
  var vidData = await ytFetch('videos', { part: 'snippet,contentDetails,statistics', id: ids });

  var videos = (vidData.items || []).map(function(v) {
    return {
      id: v.id,
      title: v.snippet.title,
      description: v.snippet.description,
      channelId: v.snippet.channelId,
      channelTitle: v.snippet.channelTitle,
      publishedAt: v.snippet.publishedAt,
      thumb: v.snippet.thumbnails.high ? v.snippet.thumbnails.high.url : v.snippet.thumbnails.medium.url,
      duration: parseDuration(v.contentDetails.duration),
      views: formatCount(v.statistics.viewCount)
    };
  });

  videoCache[channelId] = videos;
  return videos;
}

// ═══════════════════════════════════════════
//  PRE-GENERATE SUMMARIES
// ═══════════════════════════════════════════
function showGenProgress(text, pct) {
  var el = document.getElementById('genProgress');
  el.classList.add('visible');
  document.getElementById('genProgressText').textContent = text;
  document.getElementById('genBarFill').style.width = pct + '%';
}

function hideGenProgress() {
  document.getElementById('genProgress').classList.remove('visible');
}

async function preGenerateChannel(channelId) {
  if (!keys.yt || !keys.claude) return;

  var ch = channels.find(function(c) { return c.id === channelId; });
  if (!ch) return;
  var level = ch.detailLevel || 'tldr';

  try {
    showGenProgress('Fetching videos for ' + ch.title + '...', 5);
    var videos = await fetchChannelVideos(channelId);
    if (videos.length === 0) { hideGenProgress(); return; }

    var needsTranscript = (level === 'narration');

    for (var i = 0; i < videos.length; i++) {
      var v = videos[i];
      if (!summaryCache[v.id]) summaryCache[v.id] = {};

      // Skip if already cached for this level
      if (summaryCache[v.id][level]) continue;

      var pct = 10 + Math.round((i / videos.length) * 85);
      showGenProgress('Generating ' + DETAIL_LEVELS[level].label + ' (' + (i+1) + '/' + videos.length + ')...', pct);

      if (needsTranscript) {
        // Get transcript first
        var transcript = await fetchTranscript(v.id);
        if (transcript) {
          summaryCache[v.id][level] = await generateSummary(v, level, transcript);
        } else {
          summaryCache[v.id][level] = '⚠ Transcript unavailable for this video.';
        }
      } else {
        summaryCache[v.id][level] = await generateSummary(v, level, null);
      }

      saveSummaries();
    }

    showGenProgress('Done!', 100);
    setTimeout(hideGenProgress, 1200);
    renderFeed();

  } catch (err) {
    console.error('Pre-gen error:', err);
    showGenProgress('Error: ' + err.message, 100);
    setTimeout(hideGenProgress, 3000);
  }
}

async function fetchTranscript(videoId) {
  if (!keys.apify) return null;
  try {
    var res = await fetch('https://api.apify.com/v2/acts/karamelo~youtube-transcripts/run-sync-get-dataset-items?token=' + keys.apify, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        urls: ['https://www.youtube.com/watch?v=' + videoId],
        outputFormat: 'singleStringText'
      })
    });
    if (!res.ok) return null;
    var data = await res.json();
    if (!data || data.length === 0) return null;
    var item = data[0];
    var t = item.text || item.transcript || item.content || '';
    if (!t) {
      for (var k in item) {
        if (typeof item[k] === 'string' && item[k].length > t.length) t = item[k];
      }
    }
    return t && t.length > 30 ? t : null;
  } catch (e) {
    console.error('Transcript error:', e);
    return null;
  }
}

async function generateSummary(video, level, transcript) {
  var prompt = '';

  if (level === 'tldr') {
    prompt = 'Write a 1-2 sentence TLDR for this YouTube video. Be extremely concise — capture the single core takeaway.\n\nTitle: ' + video.title + '\nChannel: ' + video.channelTitle + '\nDescription: ' + (video.description || '').substring(0, 800);
  } else if (level === 'brief') {
    prompt = 'Write a 3-4 sentence summary of this YouTube video. Include the main topic, key points, and conclusion. Be informative but concise.\n\nTitle: ' + video.title + '\nChannel: ' + video.channelTitle + '\nDescription: ' + (video.description || '').substring(0, 800);
    if (transcript) {
      prompt += '\n\nTranscript excerpt: ' + transcript.substring(0, 3000);
    }
  } else if (level === 'narration') {
    prompt = 'You are the narrator for the YouTube channel "' + video.channelTitle + '". Write a detailed, engaging narration of this video as if you are telling the story of what happens in the video. Write in the voice/style of the channel. Use paragraphs, be vivid, cover all major points and examples. The reader should feel like they watched the video after reading this. 5-8 paragraphs.\n\nTitle: ' + video.title;
    if (transcript) {
      prompt += '\n\nFull transcript:\n' + transcript.substring(0, 12000);
    } else {
      prompt += '\nDescription: ' + (video.description || '').substring(0, 1500);
    }
  }

  var maxTokens = level === 'tldr' ? 150 : level === 'brief' ? 400 : 2000;

  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': keys.claude,
        'anthropic-dangerous-direct-browser-access': 'true',
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: maxTokens,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) return '⚠ API error ' + res.status;

    var data = await res.json();
    var text = '';
    for (var i = 0; i < data.content.length; i++) {
      if (data.content[i].type === 'text') text += data.content[i].text;
    }
    return text.trim() || '⚠ Empty response';
  } catch (e) {
    return '⚠ ' + e.message;
  }
}

// ═══════════════════════════════════════════
//  FEED RENDERING
// ═══════════════════════════════════════════
async function renderFeed() {
  var feedEl = document.getElementById('feed');

  if (channels.length === 0) {
    feedEl.innerHTML = '<div class="feed-empty"><div class="emoji">📖</div><h2>Your Reading Feed</h2><p>Follow YouTube channels to see AI-summarized video cards here.</p><button class="btn btn-primary" style="max-width:200px;margin:0 auto;" onclick="document.getElementById(\'searchBtn\').click()">Find Channels</button></div>';
    return;
  }

  if (!keys.yt) {
    feedEl.innerHTML = '<div class="feed-empty"><div class="emoji">🔑</div><h2>API Keys Needed</h2><p>Go to Settings and add your API keys.</p></div>';
    return;
  }

  feedEl.innerHTML = '<div class="feed-loading"><div class="spinner"></div>Loading videos...</div>';

  var targetChannels = activeFilter ? channels.filter(function(c) { return c.id === activeFilter; }) : channels;

  try {
    var allVideos = [];
    for (var i = 0; i < targetChannels.length; i++) {
      var vids = await fetchChannelVideos(targetChannels[i].id);
      var ch = targetChannels[i];
      vids.forEach(function(v) {
        v._channelThumb = ch.thumb;
        v._detailLevel = ch.detailLevel || 'tldr';
      });
      allVideos = allVideos.concat(vids);
    }

    allVideos.sort(function(a, b) { return new Date(b.publishedAt) - new Date(a.publishedAt); });

    if (allVideos.length === 0) {
      feedEl.innerHTML = '<div class="feed-empty"><div class="emoji">📭</div><h2>No Videos Found</h2><p>This channel may not have recent videos.</p></div>';
      return;
    }

    feedEl.innerHTML = '';
    for (var j = 0; j < allVideos.length; j++) {
      feedEl.appendChild(buildCard(allVideos[j]));
    }

  } catch (err) {
    feedEl.innerHTML = '<div class="feed-empty"><div class="emoji">⚠️</div><h2>Error</h2><p>' + escHtml(err.message) + '</p></div>';
  }
}

function buildCard(video) {
  var card = document.createElement('div');
  card.className = 'card';

  var level = video._detailLevel || 'tldr';
  var cached = summaryCache[video.id] && summaryCache[video.id][level];
  var levelInfo = DETAIL_LEVELS[level];

  var contentHtml = '';
  if (cached) {
    contentHtml = '<span class="detail-badge ' + levelInfo.badge + '">' + levelInfo.label + '</span>\n' + escHtml(cached);
  } else {
    contentHtml = '<div class="content-loading"><div class="mini-spinner"></div> Generating ' + levelInfo.label + '...</div>';
  }

  var isNarration = (level === 'narration');

  card.innerHTML = '' +
    '<div class="card-header">' +
      '<div class="card-avatar"><img src="' + (video._channelThumb || '') + '" alt="" /></div>' +
      '<div>' +
        '<div class="card-channel">' + escHtml(video.channelTitle) + '</div>' +
        '<div class="card-date">' + timeAgo(video.publishedAt) + (video.views ? ' · ' + video.views + ' views' : '') + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="card-thumb" data-vid="' + video.id + '">' +
      '<img src="' + video.thumb + '" alt="" />' +
      '<div class="play-overlay"><div class="play-btn-overlay">▶</div></div>' +
      (video.duration ? '<div class="card-duration">' + video.duration + '</div>' : '') +
    '</div>' +
    '<div class="card-body">' +
      '<div class="card-title">' + escHtml(video.title) + '</div>' +
    '</div>' +
    '<div class="card-content' + (isNarration ? ' narration' : '') + '" id="content-' + video.id + '">' +
      contentHtml +
    '</div>' +
    '<div class="card-actions">' +
      '<button class="card-action-btn" data-play="' + video.id + '">▶ Watch</button>' +
      '<button class="card-action-btn" data-share="' + video.id + '">↗ Share</button>' +
    '</div>';

  card.querySelector('.card-thumb').addEventListener('click', function() {
    playVideo(this.getAttribute('data-vid'));
  });

  card.querySelector('[data-play]').addEventListener('click', function() {
    playVideo(this.getAttribute('data-play'));
  });

  card.querySelector('[data-share]').addEventListener('click', function() {
    var vid = this.getAttribute('data-share');
    var url = 'https://youtu.be/' + vid;
    if (navigator.share) { navigator.share({ url: url }); }
    else { navigator.clipboard.writeText(url); toast('Link copied'); }
  });

  // If not cached, generate inline (fallback for edge cases)
  if (!cached) {
    generateInline(video, level);
  }

  return card;
}

async function generateInline(video, level) {
  var needsTranscript = (level === 'narration');
  var transcript = null;

  if (needsTranscript) {
    transcript = await fetchTranscript(video.id);
  }

  var text = await generateSummary(video, level, transcript);

  if (!summaryCache[video.id]) summaryCache[video.id] = {};
  summaryCache[video.id][level] = text;
  saveSummaries();

  var el = document.getElementById('content-' + video.id);
  if (el) {
    var levelInfo = DETAIL_LEVELS[level];
    el.innerHTML = '<span class="detail-badge ' + levelInfo.badge + '">' + levelInfo.label + '</span>\n' + escHtml(text);
    if (level === 'narration') el.classList.add('narration');
  }
}

// ═══════════════════════════════════════════
//  VIDEO PLAYER
// ═══════════════════════════════════════════
function playVideo(videoId) {
  document.getElementById('playerFrame').src = 'https://www.youtube.com/embed/' + videoId + '?autoplay=1';
  document.getElementById('playerOverlay').classList.add('visible');
}

document.getElementById('playerClose').addEventListener('click', function() {
  document.getElementById('playerFrame').src = '';
  document.getElementById('playerOverlay').classList.remove('visible');
});

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
loadState();
renderStories();
renderFeed();

if (!keys.yt || !keys.claude || !keys.apify) {
  showScreen('settingsScreen');
}
</script>
