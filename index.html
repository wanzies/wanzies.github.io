<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TubeRead</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Playfair+Display:wght@600;700&display=swap');

  :root {
    --bg: #faf9f7;
    --surface: #ffffff;
    --surface2: #f3f1ee;
    --border: #e8e5e0;
    --text: #1a1a18;
    --text2: #6b6860;
    --text3: #9e9a92;
    --accent: #e23d28;
    --accent2: #c7311e;
    --accent-soft: #fdf0ee;
    --blue: #2563eb;
    --green: #16a34a;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-lg: 0 4px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.06);
    --radius: 12px;
    --sans: 'DM Sans', -apple-system, sans-serif;
    --display: 'Playfair Display', Georgia, serif;
    --max-w: 480px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ─── App shell ─── */
  .app {
    max-width: var(--max-w);
    margin: 0 auto;
    min-height: 100dvh;
    background: var(--bg);
    position: relative;
  }

  /* ─── Top bar ─── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .topbar h1 {
    font-family: var(--display);
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  .topbar-actions {
    display: flex;
    gap: 8px;
  }

  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 16px;
  }

  .icon-btn:active { transform: scale(0.92); background: var(--surface2); }

  /* ─── Screens ─── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ─── Settings screen ─── */
  .settings-screen {
    padding: 16px;
  }

  .settings-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }

  .settings-group h3 {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text3);
    margin-bottom: 10px;
  }

  .key-field { margin-bottom: 10px; }
  .key-field:last-child { margin-bottom: 0; }

  .key-field label {
    display: block;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 4px;
  }

  .key-field input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: monospace;
    font-size: 0.8rem;
    background: var(--surface2);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .key-field input:focus { border-color: var(--accent); }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    font-family: var(--sans);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn:active { transform: scale(0.96); }

  .btn-primary {
    background: var(--accent);
    color: white;
    width: 100%;
  }

  .btn-primary:hover { background: var(--accent2); }

  .btn-outline {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
  }

  .btn-small {
    padding: 6px 14px;
    font-size: 0.78rem;
  }

  .btn-ghost {
    background: transparent;
    color: var(--text2);
    padding: 6px 10px;
    font-size: 0.78rem;
  }

  /* ─── Channel stories row ─── */
  .stories-row {
    display: flex;
    gap: 12px;
    padding: 14px 16px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }

  .stories-row::-webkit-scrollbar { display: none; }

  .story-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 64px;
    cursor: pointer;
  }

  .story-avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 2px solid var(--border);
    overflow: hidden;
    transition: border-color 0.15s;
    background: var(--surface2);
  }

  .story-item.active .story-avatar,
  .story-item:active .story-avatar {
    border-color: var(--accent);
  }

  .story-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .story-name {
    font-size: 0.65rem;
    font-weight: 500;
    color: var(--text2);
    max-width: 64px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-align: center;
  }

  .story-item.all-item .story-avatar {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    background: var(--accent-soft);
    border-color: var(--accent);
  }

  /* ─── Feed ─── */
  .feed {
    padding-bottom: 80px;
  }

  .feed-empty {
    text-align: center;
    padding: 60px 32px;
  }

  .feed-empty .emoji { font-size: 3rem; margin-bottom: 12px; }

  .feed-empty h2 {
    font-family: var(--display);
    font-size: 1.2rem;
    margin-bottom: 6px;
  }

  .feed-empty p {
    color: var(--text2);
    font-size: 0.85rem;
    margin-bottom: 20px;
  }

  /* ─── Video card ─── */
  .card {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    animation: cardIn 0.35s ease both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
  }

  .card-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    background: var(--surface2);
  }

  .card-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .card-channel {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
  }

  .card-date {
    font-size: 0.7rem;
    color: var(--text3);
  }

  .card-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--surface2);
    position: relative;
    cursor: pointer;
    overflow: hidden;
  }

  .card-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
  }

  .card-thumb:active img { transform: scale(1.02); }

  .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.2);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card-thumb:hover .play-overlay { opacity: 1; }

  .play-btn-overlay {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 1.4rem;
    backdrop-filter: blur(4px);
  }

  .card-duration {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(0,0,0,0.8);
    color: white;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: monospace;
  }

  .card-body {
    padding: 12px 16px 14px;
  }

  .card-title {
    font-size: 0.9rem;
    font-weight: 600;
    line-height: 1.35;
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-caption {
    font-size: 0.82rem;
    color: var(--text2);
    line-height: 1.5;
    margin-bottom: 4px;
  }

  .card-caption.collapsed {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .read-more-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-family: var(--sans);
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 0;
  }

  .card-detail {
    display: none;
    padding: 0 16px 14px;
    animation: expandIn 0.3s ease;
  }

  .card-detail.visible { display: block; }

  @keyframes expandIn {
    from { opacity: 0; max-height: 0; }
    to { opacity: 1; max-height: 2000px; }
  }

  .detail-summary {
    font-size: 0.85rem;
    color: var(--text);
    line-height: 1.65;
    white-space: pre-wrap;
    padding: 12px;
    background: var(--surface2);
    border-radius: 8px;
    border-left: 3px solid var(--accent);
  }

  .detail-loading {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px;
    background: var(--surface2);
    border-radius: 8px;
    color: var(--text3);
    font-size: 0.82rem;
  }

  .mini-spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .card-actions {
    display: flex;
    gap: 16px;
    padding: 0 16px 12px;
  }

  .card-action-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    background: none;
    border: none;
    font-family: var(--sans);
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    padding: 4px 0;
  }

  .card-action-btn:active { color: var(--accent); }

  /* ─── Video player overlay ─── */
  .player-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.92);
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .player-overlay.visible { display: flex; }

  .player-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.15);
    color: white;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .player-container {
    width: 100%;
    max-width: var(--max-w);
    aspect-ratio: 16/9;
  }

  .player-container iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 8px;
  }

  /* ─── Search overlay ─── */
  .search-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 150;
    background: var(--bg);
    flex-direction: column;
  }

  .search-overlay.visible { display: flex; }

  .search-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .search-bar input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 24px;
    font-family: var(--sans);
    font-size: 0.9rem;
    background: var(--surface2);
    color: var(--text);
    outline: none;
  }

  .search-bar input:focus { border-color: var(--accent); }

  .search-cancel {
    background: none;
    border: none;
    font-family: var(--sans);
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--accent);
    cursor: pointer;
    white-space: nowrap;
  }

  .search-results {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .search-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.1s;
  }

  .search-item:active { background: var(--surface2); }

  .search-item-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    background: var(--surface2);
  }

  .search-item-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .search-item-info { flex: 1; min-width: 0; }

  .search-item-name {
    font-size: 0.88rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .search-item-bio {
    font-size: 0.75rem;
    color: var(--text2);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.35;
  }

  .search-item-sub {
    font-size: 0.7rem;
    color: var(--text3);
    margin-top: 2px;
  }

  .sub-btn {
    padding: 6px 16px;
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .sub-btn.subscribe {
    background: var(--accent);
    color: white;
  }

  .sub-btn.subscribed {
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
  }

  .search-empty {
    text-align: center;
    padding: 40px 16px;
    color: var(--text3);
    font-size: 0.85rem;
  }

  .search-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 24px;
    color: var(--text3);
    font-size: 0.82rem;
  }

  /* ─── Manage channels screen ─── */
  .manage-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .manage-item-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    overflow: hidden;
    background: var(--surface2);
  }

  .manage-item-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .manage-item-info { flex: 1; }

  .manage-item-name { font-size: 0.85rem; font-weight: 600; }
  .manage-item-subs { font-size: 0.72rem; color: var(--text3); }

  .delete-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid #e8e5e0;
    background: white;
    color: var(--accent);
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .delete-btn:active { background: var(--accent-soft); }

  /* ─── Feed loading ─── */
  .feed-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 40px;
    color: var(--text3);
    font-size: 0.82rem;
  }

  .feed-loading .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  /* ─── Bottom nav ─── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: var(--max-w);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 8px 0;
    cursor: pointer;
    border: none;
    background: none;
    font-family: var(--sans);
    color: var(--text3);
    transition: color 0.15s;
  }

  .nav-item.active { color: var(--accent); }

  .nav-item .nav-icon { font-size: 1.2rem; }
  .nav-item .nav-label { font-size: 0.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }

  /* ─── Toast ─── */
  .toast {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: white;
    font-size: 0.8rem;
    font-weight: 500;
    padding: 10px 20px;
    border-radius: 24px;
    z-index: 300;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Top bar -->
  <div class="topbar">
    <h1>TubeRead</h1>
    <div class="topbar-actions">
      <button class="icon-btn" id="searchBtn" title="Find channels">🔍</button>
      <button class="icon-btn" id="settingsBtn" title="Settings">⚙️</button>
    </div>
  </div>

  <!-- ═══ Feed screen ═══ -->
  <div class="screen active" id="feedScreen">
    <div class="stories-row" id="storiesRow"></div>
    <div class="feed" id="feed"></div>
  </div>

  <!-- ═══ Manage screen ═══ -->
  <div class="screen" id="manageScreen">
    <div style="padding:16px;">
      <h2 style="font-family:var(--display);font-size:1.15rem;margin-bottom:12px;">Your Channels</h2>
      <div id="manageList"></div>
      <div id="manageEmpty" style="display:none;text-align:center;padding:40px 16px;color:var(--text3);font-size:0.85rem;">
        No channels yet. Tap 🔍 to discover.
      </div>
    </div>
  </div>

  <!-- ═══ Settings screen ═══ -->
  <div class="screen" id="settingsScreen">
    <div class="settings-screen">
      <h2 style="font-family:var(--display);font-size:1.15rem;margin-bottom:12px;">Settings</h2>
      <div class="settings-group">
        <h3>API Keys</h3>
        <div class="key-field">
          <label>YouTube Data API</label>
          <input type="password" id="sYtKey" placeholder="AIza..." />
        </div>
        <div class="key-field">
          <label>Anthropic (Claude)</label>
          <input type="password" id="sClaudeKey" placeholder="sk-ant-..." />
        </div>
        <div class="key-field">
          <label>Apify</label>
          <input type="password" id="sApifyKey" placeholder="apify_api_..." />
        </div>
      </div>
      <button class="btn btn-primary" id="saveKeysBtn">Save Keys</button>
      <p id="keysStatus" style="text-align:center;margin-top:8px;font-size:0.78rem;color:var(--text3);"></p>
    </div>
  </div>

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <button class="nav-item active" data-screen="feedScreen">
      <span class="nav-icon">📰</span><span class="nav-label">Feed</span>
    </button>
    <button class="nav-item" data-screen="manageScreen">
      <span class="nav-icon">📺</span><span class="nav-label">Channels</span>
    </button>
    <button class="nav-item" data-screen="settingsScreen">
      <span class="nav-icon">⚙️</span><span class="nav-label">Settings</span>
    </button>
  </div>
</div>

<!-- Search overlay -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search YouTube channels..." autocomplete="off" />
    <button class="search-cancel" id="searchCancel">Cancel</button>
  </div>
  <div class="search-results" id="searchResults">
    <div class="search-empty">Type a channel name to search</div>
  </div>
</div>

<!-- Video player overlay -->
<div class="player-overlay" id="playerOverlay">
  <button class="player-close" id="playerClose">✕</button>
  <div class="player-container">
    <iframe id="playerFrame" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
var keys = { yt: '', claude: '', apify: '' };
var channels = []; // [{id, title, thumb, description, subs}]
var videoCache = {}; // channelId -> [videos]
var summaryCache = {}; // videoId -> { brief, full }
var activeFilter = null; // null = all, channelId = filter
var searchTimer = null;

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2400);
}

function formatCount(n) {
  if (!n) return '';
  n = parseInt(n);
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(0) + 'K';
  return n.toString();
}

function timeAgo(dateStr) {
  var d = new Date(dateStr);
  var now = new Date();
  var diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
  return d.toLocaleDateString();
}

function parseDuration(iso) {
  if (!iso) return '';
  var m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return '';
  var h = m[1] ? parseInt(m[1]) : 0;
  var min = m[2] ? parseInt(m[2]) : 0;
  var s = m[3] ? parseInt(m[3]) : 0;
  if (h > 0) return h + ':' + String(min).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  return min + ':' + String(s).padStart(2,'0');
}

async function ytFetch(endpoint, params) {
  params.key = keys.yt;
  var qs = Object.keys(params).map(function(k) { return k + '=' + encodeURIComponent(params[k]); }).join('&');
  var res = await fetch('https://www.googleapis.com/youtube/v3/' + endpoint + '?' + qs);
  if (!res.ok) throw new Error('YouTube API ' + res.status);
  return res.json();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(function(n) {
    n.classList.toggle('active', n.getAttribute('data-screen') === id);
  });
  if (id === 'manageScreen') renderManageList();
  if (id === 'feedScreen') renderFeed();
}

document.querySelectorAll('.nav-item').forEach(function(btn) {
  btn.addEventListener('click', function() {
    showScreen(this.getAttribute('data-screen'));
  });
});

// ═══════════════════════════════════════════
//  SETTINGS / KEYS
// ═══════════════════════════════════════════
function loadState() {
  try {
    var k = JSON.parse(localStorage.getItem('tr_keys') || '{}');
    keys.yt = k.yt || '';
    keys.claude = k.claude || '';
    keys.apify = k.apify || '';
    channels = JSON.parse(localStorage.getItem('tr_channels') || '[]');
    summaryCache = JSON.parse(localStorage.getItem('tr_summaries') || '{}');
  } catch(e) {}
  document.getElementById('sYtKey').value = keys.yt;
  document.getElementById('sClaudeKey').value = keys.claude;
  document.getElementById('sApifyKey').value = keys.apify;
}

function saveKeys() {
  keys.yt = document.getElementById('sYtKey').value.trim();
  keys.claude = document.getElementById('sClaudeKey').value.trim();
  keys.apify = document.getElementById('sApifyKey').value.trim();
  localStorage.setItem('tr_keys', JSON.stringify(keys));
  var missing = [];
  if (!keys.yt) missing.push('YouTube');
  if (!keys.claude) missing.push('Claude');
  if (!keys.apify) missing.push('Apify');
  var status = document.getElementById('keysStatus');
  if (missing.length === 0) {
    status.textContent = 'All keys saved.';
    status.style.color = 'var(--green)';
    toast('Keys saved');
  } else {
    status.textContent = 'Missing: ' + missing.join(', ');
    status.style.color = 'var(--accent)';
  }
}

document.getElementById('saveKeysBtn').addEventListener('click', saveKeys);
document.getElementById('settingsBtn').addEventListener('click', function() { showScreen('settingsScreen'); });

// ═══════════════════════════════════════════
//  CHANNEL SEARCH
// ═══════════════════════════════════════════
document.getElementById('searchBtn').addEventListener('click', function() {
  document.getElementById('searchOverlay').classList.add('visible');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchInput').focus();
  document.getElementById('searchResults').innerHTML = '<div class="search-empty">Type a channel name to search</div>';
});

document.getElementById('searchCancel').addEventListener('click', function() {
  document.getElementById('searchOverlay').classList.remove('visible');
});

document.getElementById('searchInput').addEventListener('input', function() {
  var q = this.value.trim();
  clearTimeout(searchTimer);
  if (q.length < 2) {
    document.getElementById('searchResults').innerHTML = '<div class="search-empty">Type a channel name to search</div>';
    return;
  }
  document.getElementById('searchResults').innerHTML = '<div class="search-loading"><div class="mini-spinner"></div> Searching...</div>';
  searchTimer = setTimeout(function() { searchChannels(q); }, 400);
});

async function searchChannels(query) {
  if (!keys.yt) {
    document.getElementById('searchResults').innerHTML = '<div class="search-empty">Set your YouTube API key in Settings first.</div>';
    return;
  }
  try {
    var data = await ytFetch('search', { part: 'snippet', type: 'channel', q: query, maxResults: 8 });
    if (!data.items || data.items.length === 0) {
      document.getElementById('searchResults').innerHTML = '<div class="search-empty">No channels found</div>';
      return;
    }
    // Get channel details for subscriber counts
    var ids = data.items.map(function(i) { return i.snippet.channelId; }).join(',');
    var details = await ytFetch('channels', { part: 'snippet,statistics', id: ids });
    var detailMap = {};
    if (details.items) {
      details.items.forEach(function(c) { detailMap[c.id] = c; });
    }
    renderSearchResults(data.items, detailMap);
  } catch (err) {
    document.getElementById('searchResults').innerHTML = '<div class="search-empty">Error: ' + err.message + '</div>';
  }
}

function renderSearchResults(items, detailMap) {
  var html = '';
  items.forEach(function(item) {
    var chId = item.snippet.channelId;
    var detail = detailMap[chId];
    var thumb = item.snippet.thumbnails && item.snippet.thumbnails['default'] ? item.snippet.thumbnails['default'].url : '';
    var desc = detail ? (detail.snippet.description || '').substring(0, 120) : (item.snippet.description || '').substring(0, 120);
    var subs = detail && detail.statistics ? formatCount(detail.statistics.subscriberCount) + ' subscribers' : '';
    var isSub = channels.some(function(c) { return c.id === chId; });

    html += '<div class="search-item" data-chid="' + chId + '">';
    html += '<div class="search-item-avatar"><img src="' + thumb + '" alt="" /></div>';
    html += '<div class="search-item-info">';
    html += '<div class="search-item-name">' + escHtml(item.snippet.title) + '</div>';
    html += '<div class="search-item-bio">' + escHtml(desc) + '</div>';
    if (subs) html += '<div class="search-item-sub">' + subs + '</div>';
    html += '</div>';
    html += '<button class="sub-btn ' + (isSub ? 'subscribed' : 'subscribe') + '" data-chid="' + chId + '" data-title="' + escAttr(item.snippet.title) + '" data-thumb="' + escAttr(thumb) + '" data-desc="' + escAttr(desc) + '" data-subs="' + escAttr(subs) + '">' + (isSub ? 'Following' : 'Follow') + '</button>';
    html += '</div>';
  });
  document.getElementById('searchResults').innerHTML = html;

  document.querySelectorAll('.sub-btn').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var chId = this.getAttribute('data-chid');
      var isSub = channels.some(function(c) { return c.id === chId; });
      if (isSub) {
        channels = channels.filter(function(c) { return c.id !== chId; });
        this.className = 'sub-btn subscribe';
        this.textContent = 'Follow';
        toast('Unfollowed');
      } else {
        channels.push({
          id: chId,
          title: this.getAttribute('data-title'),
          thumb: this.getAttribute('data-thumb'),
          description: this.getAttribute('data-desc'),
          subs: this.getAttribute('data-subs')
        });
        this.className = 'sub-btn subscribed';
        this.textContent = 'Following';
        toast('Following!');
        delete videoCache[chId]; // force refresh
      }
      localStorage.setItem('tr_channels', JSON.stringify(channels));
      renderStories();
    });
  });
}

function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) { return (s||'').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

// ═══════════════════════════════════════════
//  STORIES ROW
// ═══════════════════════════════════════════
function renderStories() {
  var row = document.getElementById('storiesRow');
  if (channels.length === 0) {
    row.innerHTML = '';
    return;
  }
  var html = '<div class="story-item all-item' + (activeFilter === null ? ' active' : '') + '" data-filter="all">';
  html += '<div class="story-avatar">✦</div>';
  html += '<div class="story-name">All</div></div>';

  channels.forEach(function(ch) {
    html += '<div class="story-item' + (activeFilter === ch.id ? ' active' : '') + '" data-filter="' + ch.id + '">';
    html += '<div class="story-avatar"><img src="' + ch.thumb + '" alt="" /></div>';
    html += '<div class="story-name">' + escHtml(ch.title) + '</div></div>';
  });

  row.innerHTML = html;

  row.querySelectorAll('.story-item').forEach(function(item) {
    item.addEventListener('click', function() {
      var f = this.getAttribute('data-filter');
      activeFilter = (f === 'all') ? null : f;
      renderStories();
      renderFeed();
    });
  });
}

// ═══════════════════════════════════════════
//  MANAGE CHANNELS
// ═══════════════════════════════════════════
function renderManageList() {
  var list = document.getElementById('manageList');
  var empty = document.getElementById('manageEmpty');
  if (channels.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  var html = '';
  channels.forEach(function(ch) {
    html += '<div class="manage-item">';
    html += '<div class="manage-item-avatar"><img src="' + ch.thumb + '" alt="" /></div>';
    html += '<div class="manage-item-info">';
    html += '<div class="manage-item-name">' + escHtml(ch.title) + '</div>';
    html += '<div class="manage-item-subs">' + (ch.subs || '') + '</div>';
    html += '</div>';
    html += '<button class="delete-btn" data-chid="' + ch.id + '" title="Unfollow">✕</button>';
    html += '</div>';
  });
  list.innerHTML = html;

  list.querySelectorAll('.delete-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var chId = this.getAttribute('data-chid');
      channels = channels.filter(function(c) { return c.id !== chId; });
      localStorage.setItem('tr_channels', JSON.stringify(channels));
      renderManageList();
      renderStories();
      toast('Channel removed');
    });
  });
}

// ═══════════════════════════════════════════
//  FEED
// ═══════════════════════════════════════════
async function fetchChannelVideos(channelId) {
  if (videoCache[channelId]) return videoCache[channelId];

  var searchData = await ytFetch('search', {
    part: 'snippet',
    channelId: channelId,
    order: 'date',
    type: 'video',
    maxResults: 5
  });

  if (!searchData.items || searchData.items.length === 0) {
    videoCache[channelId] = [];
    return [];
  }

  var ids = searchData.items.map(function(i) { return i.id.videoId; }).join(',');
  var vidData = await ytFetch('videos', { part: 'snippet,contentDetails,statistics', id: ids });

  var videos = (vidData.items || []).map(function(v) {
    return {
      id: v.id,
      title: v.snippet.title,
      description: v.snippet.description,
      channelId: v.snippet.channelId,
      channelTitle: v.snippet.channelTitle,
      publishedAt: v.snippet.publishedAt,
      thumb: v.snippet.thumbnails.high ? v.snippet.thumbnails.high.url : v.snippet.thumbnails.medium.url,
      duration: parseDuration(v.contentDetails.duration),
      views: formatCount(v.statistics.viewCount)
    };
  });

  videoCache[channelId] = videos;
  return videos;
}

async function renderFeed() {
  var feedEl = document.getElementById('feed');

  if (channels.length === 0) {
    feedEl.innerHTML = '<div class="feed-empty"><div class="emoji">📖</div><h2>Your Reading Feed</h2><p>Follow YouTube channels to see AI-summarized video cards here.</p><button class="btn btn-primary" style="max-width:200px;margin:0 auto;" onclick="document.getElementById(\'searchBtn\').click()">Find Channels</button></div>';
    return;
  }

  if (!keys.yt) {
    feedEl.innerHTML = '<div class="feed-empty"><div class="emoji">🔑</div><h2>API Keys Needed</h2><p>Go to Settings and add your API keys to get started.</p></div>';
    return;
  }

  feedEl.innerHTML = '<div class="feed-loading"><div class="spinner"></div>Loading videos...</div>';

  var targetChannels = activeFilter ? channels.filter(function(c) { return c.id === activeFilter; }) : channels;

  try {
    var allVideos = [];
    for (var i = 0; i < targetChannels.length; i++) {
      var vids = await fetchChannelVideos(targetChannels[i].id);
      var ch = targetChannels[i];
      vids.forEach(function(v) {
        v._channelThumb = ch.thumb;
      });
      allVideos = allVideos.concat(vids);
    }

    // Sort by date, newest first
    allVideos.sort(function(a, b) { return new Date(b.publishedAt) - new Date(a.publishedAt); });

    if (allVideos.length === 0) {
      feedEl.innerHTML = '<div class="feed-empty"><div class="emoji">📭</div><h2>No Videos Found</h2><p>This channel may not have recent videos.</p></div>';
      return;
    }

    // Generate brief captions with Claude
    feedEl.innerHTML = '';
    for (var j = 0; j < allVideos.length; j++) {
      var card = buildCard(allVideos[j]);
      feedEl.appendChild(card);
      // Generate brief caption async
      generateBriefCaption(allVideos[j]);
    }

  } catch (err) {
    feedEl.innerHTML = '<div class="feed-empty"><div class="emoji">⚠️</div><h2>Error</h2><p>' + escHtml(err.message) + '</p></div>';
  }
}

function buildCard(video) {
  var card = document.createElement('div');
  card.className = 'card';
  card.setAttribute('data-vid', video.id);

  var briefId = 'brief-' + video.id;
  var detailId = 'detail-' + video.id;
  var cached = summaryCache[video.id];

  card.innerHTML = '' +
    '<div class="card-header">' +
      '<div class="card-avatar"><img src="' + (video._channelThumb || '') + '" alt="" /></div>' +
      '<div>' +
        '<div class="card-channel">' + escHtml(video.channelTitle) + '</div>' +
        '<div class="card-date">' + timeAgo(video.publishedAt) + (video.views ? ' · ' + video.views + ' views' : '') + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="card-thumb" data-vid="' + video.id + '">' +
      '<img src="' + video.thumb + '" alt="" />' +
      '<div class="play-overlay"><div class="play-btn-overlay">▶</div></div>' +
      (video.duration ? '<div class="card-duration">' + video.duration + '</div>' : '') +
    '</div>' +
    '<div class="card-body">' +
      '<div class="card-title">' + escHtml(video.title) + '</div>' +
      '<div class="card-caption collapsed" id="' + briefId + '">' +
        (cached && cached.brief ? cached.brief : '<span style="color:var(--text3)">Generating summary...</span>') +
      '</div>' +
      '<button class="read-more-btn" data-vid="' + video.id + '">Read more</button>' +
    '</div>' +
    '<div class="card-detail" id="' + detailId + '"></div>' +
    '<div class="card-actions">' +
      '<button class="card-action-btn" data-play="' + video.id + '">▶ Watch</button>' +
      '<button class="card-action-btn" data-share="' + video.id + '">↗ Share</button>' +
    '</div>';

  // Event: play video from thumb
  card.querySelector('.card-thumb').addEventListener('click', function() {
    playVideo(this.getAttribute('data-vid'));
  });

  // Event: play button
  card.querySelector('[data-play]').addEventListener('click', function() {
    playVideo(this.getAttribute('data-play'));
  });

  // Event: share
  card.querySelector('[data-share]').addEventListener('click', function() {
    var vid = this.getAttribute('data-share');
    var url = 'https://youtu.be/' + vid;
    if (navigator.share) {
      navigator.share({ url: url });
    } else {
      navigator.clipboard.writeText(url);
      toast('Link copied');
    }
  });

  // Event: read more
  card.querySelector('.read-more-btn').addEventListener('click', function() {
    var vid = this.getAttribute('data-vid');
    var detailEl = document.getElementById('detail-' + vid);
    var captionEl = document.getElementById('brief-' + vid);
    if (detailEl.classList.contains('visible')) {
      detailEl.classList.remove('visible');
      captionEl.classList.add('collapsed');
      this.textContent = 'Read more';
    } else {
      captionEl.classList.remove('collapsed');
      this.textContent = 'Show less';
      loadFullSummary(vid, detailEl);
    }
  });

  return card;
}

// ═══════════════════════════════════════════
//  AI SUMMARIES
// ═══════════════════════════════════════════
async function generateBriefCaption(video) {
  if (summaryCache[video.id] && summaryCache[video.id].brief) return;

  if (!keys.claude) return;

  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': keys.claude,
        'anthropic-dangerous-direct-browser-access': 'true',
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 200,
        messages: [{
          role: 'user',
          content: 'Write a 2-sentence Instagram-style caption for this YouTube video. Be concise and engaging.\n\nTitle: ' + video.title + '\nChannel: ' + video.channelTitle + '\nDescription: ' + (video.description || '').substring(0, 500)
        }]
      })
    });

    if (!res.ok) return;
    var data = await res.json();
    var brief = '';
    for (var i = 0; i < data.content.length; i++) {
      if (data.content[i].type === 'text') brief += data.content[i].text;
    }
    brief = brief.trim();

    if (!summaryCache[video.id]) summaryCache[video.id] = {};
    summaryCache[video.id].brief = brief;
    localStorage.setItem('tr_summaries', JSON.stringify(summaryCache));

    var el = document.getElementById('brief-' + video.id);
    if (el) el.textContent = brief;
  } catch (e) {
    console.error('Brief caption error:', e);
  }
}

async function loadFullSummary(videoId, detailEl) {
  if (summaryCache[videoId] && summaryCache[videoId].full) {
    detailEl.innerHTML = '<div class="detail-summary">' + escHtml(summaryCache[videoId].full) + '</div>';
    detailEl.classList.add('visible');
    return;
  }

  detailEl.innerHTML = '<div class="detail-loading"><div class="mini-spinner"></div> Fetching transcript & generating detailed summary...</div>';
  detailEl.classList.add('visible');

  if (!keys.apify || !keys.claude) {
    detailEl.innerHTML = '<div class="detail-loading">Set API keys in Settings first.</div>';
    return;
  }

  try {
    // Step 1: Get transcript via Apify
    var apifyUrl = 'https://api.apify.com/v2/acts/karamelo~youtube-transcripts/run-sync-get-dataset-items?token=' + keys.apify;
    var apifyRes = await fetch(apifyUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        urls: ['https://www.youtube.com/watch?v=' + videoId],
        outputFormat: 'singleStringText'
      })
    });

    if (!apifyRes.ok) throw new Error('Apify error ' + apifyRes.status);

    var apifyData = await apifyRes.json();
    var transcript = '';
    if (apifyData && apifyData.length > 0) {
      var item = apifyData[0];
      transcript = item.text || item.transcript || item.content || '';
      if (!transcript) {
        // Find longest string
        for (var k in item) {
          if (typeof item[k] === 'string' && item[k].length > transcript.length) {
            transcript = item[k];
          }
        }
      }
    }

    if (!transcript || transcript.length < 30) {
      throw new Error('No transcript available for this video.');
    }

    // Step 2: Summarize with Claude
    var claudeRes = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': keys.claude,
        'anthropic-dangerous-direct-browser-access': 'true',
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        messages: [{
          role: 'user',
          content: 'Summarize this YouTube video transcript in 3-5 clear paragraphs. Include the main points, key insights, and conclusions. Write for someone who wants to understand the video without watching it.\n\nTranscript:\n' + transcript.substring(0, 12000)
        }]
      })
    });

    if (!claudeRes.ok) throw new Error('Claude API error ' + claudeRes.status);

    var claudeData = await claudeRes.json();
    var fullSummary = '';
    for (var i = 0; i < claudeData.content.length; i++) {
      if (claudeData.content[i].type === 'text') fullSummary += claudeData.content[i].text;
    }
    fullSummary = fullSummary.trim();

    if (!summaryCache[videoId]) summaryCache[videoId] = {};
    summaryCache[videoId].full = fullSummary;
    localStorage.setItem('tr_summaries', JSON.stringify(summaryCache));

    detailEl.innerHTML = '<div class="detail-summary">' + escHtml(fullSummary) + '</div>';

  } catch (err) {
    detailEl.innerHTML = '<div class="detail-loading" style="color:var(--accent);">⚠ ' + escHtml(err.message) + '</div>';
  }
}

// ═══════════════════════════════════════════
//  VIDEO PLAYER
// ═══════════════════════════════════════════
function playVideo(videoId) {
  document.getElementById('playerFrame').src = 'https://www.youtube.com/embed/' + videoId + '?autoplay=1';
  document.getElementById('playerOverlay').classList.add('visible');
}

document.getElementById('playerClose').addEventListener('click', function() {
  document.getElementById('playerFrame').src = '';
  document.getElementById('playerOverlay').classList.remove('visible');
});

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
loadState();
renderStories();
renderFeed();

// Show settings if no keys
if (!keys.yt || !keys.claude || !keys.apify) {
  showScreen('settingsScreen');
}
